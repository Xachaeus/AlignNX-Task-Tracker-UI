

<div class="login-page-container">
  <p style="color:black">{{ message() }} </p>
  <input [(ngModel)]="username" placeholder="Username" (keyup.enter)="check_credentials()" />
  <input [(ngModel)]="password" placeholder="Password" (keyup.enter)="check_credentials()" type="password" />
  <button class="btn-login" (click)="check_credentials()" [disabled]="loading()">Sign In</button>
</div>
